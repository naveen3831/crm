<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="100%" height="100%">
  <!-- Icon Group -->
  <g transform="translate(100, 20)">
    <!-- Blue Orbit Ring (Back half) -->
    <path d="M 20,95 C 20,55 180,55 180,95" fill="none" stroke="#1687F8" stroke-width="8" stroke-linecap="round" />

    <!-- Red Bar -->
    <rect x="52" y="70" width="20" height="65" rx="4" fill="#EE4047" />
    <rect x="62" y="50" width="6" height="6" fill="#EE4047" opacity="0.9" />
    <rect x="52" y="58" width="7" height="7" fill="#EE4047" opacity="0.8" />
    <rect x="70" y="60" width="6" height="6" fill="#EE4047" opacity="0.7" />

    <!-- Amber Bar -->
    <rect x="80" y="45" width="20" height="90" rx="4" fill="#FF9F0A" />
    <rect x="80" y="32" width="7" height="7" fill="#FF9F0A" opacity="0.9" />
    <rect x="92" y="22" width="6" height="6" fill="#FF9F0A" opacity="0.8" />
    <rect x="98" y="34" width="7" height="7" fill="#FF9F0A" opacity="0.7" />

    <!-- Green Bar -->
    <rect x="108" y="20" width="20" height="115" rx="4" fill="#27C15A" />
    <rect x="114" y="2" width="7" height="7" fill="#27C15A" opacity="0.9" />
    <rect x="108" y="10" width="6" height="6" fill="#27C15A" opacity="0.8" />
    <rect x="124" y="8" width="7" height="7" fill="#27C15A" opacity="0.7" />
    <rect x="118" y="-10" width="6" height="6" fill="#27C15A" opacity="0.9" />

    <!-- Adaptive Magnifying Glass Lens Ring -->
    <ellipse cx="100" cy="100" rx="60" ry="36" fill="none" stroke="currentColor" stroke-width="12" transform="rotate(-15, 100, 100)" />

    <!-- Blue Orbit Ring (Front half) -->
    <path d="M 20,95 C 20,135 180,135 180,95" fill="none" stroke="#1687F8" stroke-width="8" stroke-linecap="round" />

    <!-- Adaptive Magnifying Glass Handle -->
    <path d="M 70,125 L 25,175" stroke="currentColor" stroke-width="18" stroke-linecap="round" />
    <path d="M 68,127 L 27,173" stroke="currentColor" stroke-width="8" stroke-opacity="0.3" stroke-linecap="round" />
  </g>

  <!-- Typography Group (currentColor adaptivity) -->
  <g transform="translate(0, 240)">
    <!-- CRM Title -->
    <text x="200" y="80" font-family="'Manrope', sans-serif" font-weight="850" font-size="82" fill="currentColor" text-anchor="middle" letter-spacing="2">CRM</text>
    
    <!-- Subtitle Line & Text -->
    <line x1="45" y1="120" x2="105" y2="120" stroke="#1687F8" stroke-width="3" />
    <text x="200" y="125" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="currentColor" opacity="0.7" text-anchor="middle" letter-spacing="3.5">CUSTOMER RELATIONSHIP MANAGEMENT</text>
    <line x1="295" y1="120" x2="355" y2="120" stroke="#1687F8" stroke-width="3" />

    <!-- Date Line & Text -->
    <line x1="110" y1="160" x2="140" y2="160" stroke="#1687F8" stroke-width="2" />
    <text x="200" y="165" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1687F8" text-anchor="middle" letter-spacing="6">SINCE 2026</text>
    <line x1="260" y1="160" x2="290" y2="160" stroke="#1687F8" stroke-width="2" />
  </g>
</svg>
